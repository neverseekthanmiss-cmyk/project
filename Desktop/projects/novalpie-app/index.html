<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ea4c89">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://novalpie.cc https://images.novelpia.com https://*.novelpia.com https://*.novalpie.cc http://* https://*; img-src 'self' data: https: blob:; connect-src 'self' https://novalpie.cc https://*.novalpie.cc https://images.novelpia.com https://*.novelpia.com http://* https://*; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://novalpie.cc https://*.novalpie.cc blob:;">
  <title>NovalPie - 小说阅读</title>
  <style>
    :root {
      --primary-color: #ea4c89;
      --primary-hover: #f082ac;
      --toolbar-height: 50px;
      --safe-area-bottom: env(safe-area-inset-bottom);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: white;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }
    
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    /* WebView 容器 */
    #webview-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    
    #webview-frame {
      width: 100%;
      height: 100%;
      border: none;
      background-color: white;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    
    /* 加载状态 */
    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.3s ease;
    }
    
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    #loading-overlay .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    
    #loading-overlay .loading-bar {
      width: 200px;
      height: 4px;
      background: #f0f0f0;
      border-radius: 2px;
      overflow: hidden;
    }
    
    #loading-overlay .loading-bar-fill {
      width: 30%;
      height: 100%;
      background: var(--primary-color);
      border-radius: 2px;
      animation: loading 1.5s ease-in-out infinite;
    }
    
    @keyframes loading {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 50%; margin-left: 25%; }
      100% { width: 0%; margin-left: 100%; }
    }
    
    /* 浮动刷新按钮 */
    #floating-refresh {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: var(--primary-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 10px rgba(234, 76, 137, 0.4);
      z-index: 1001;
      transition: transform 0.3s ease, opacity 0.3s ease;
      cursor: pointer;
    }
    
    #floating-refresh.hidden {
      transform: scale(0.5);
      opacity: 0;
      pointer-events: none;
    }
    
    #floating-refresh:active {
      transform: scale(0.9);
    }
    
    #floating-refresh svg {
      width: 24px;
      height: 24px;
      color: white;
    }
    
    #floating-refresh.refreshing svg {
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    /* 双击检测区域提示 */
    #double-tap-hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 20px 30px;
      border-radius: 12px;
      font-size: 16px;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      text-align: center;
    }
    
    #double-tap-hint.show {
      opacity: 1;
    }
    
    /* 错误提示 */
    #error-toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 16px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      max-width: 80%;
      text-align: center;
    }
    
    #error-toast.show {
      opacity: 1;
    }
    
    /* TTS 状态提示 */
    #tts-indicator {
      position: fixed;
      top: 20px;
      left: 20px;
      background: var(--primary-color);
      color: white;
      padding: 10px 16px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 1001;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    #tts-indicator.show {
      opacity: 1;
    }
    
    #tts-indicator .dot {
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      animation: tts-pulse 1s ease-in-out infinite;
    }
    
    @keyframes tts-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- WebView 容器 -->
    <div id="webview-container">
      <iframe id="webview-frame" src="https://novalpie.cc" allow="geolocation; microphone; camera"></iframe>
      
      <!-- 加载状态 -->
      <div id="loading-overlay">
        <div class="logo">N</div>
        <div class="loading-bar">
          <div class="loading-bar-fill"></div>
        </div>
      </div>
    </div>
    
    <!-- 浮动刷新按钮 -->
    <div id="floating-refresh" title="刷新页面">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
    </div>
    
    <!-- TTS 状态指示器 -->
    <div id="tts-indicator">
      <div class="dot"></div>
      <span>听书中</span>
    </div>
    
    <!-- 双击提示 -->
    <div id="double-tap-hint">双击任意位置显示刷新按钮</div>
    
    <!-- 错误提示 -->
    <div id="error-toast"></div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
